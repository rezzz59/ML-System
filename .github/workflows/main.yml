name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "Modul 2 - Membangun dan Mengelola Metadata dengan Tools Open-Source/Latihan-CI2/MLproject/train_pca.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3
        with:
          persist-credentials: false

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # Check Env Variables
      - name: Check Env
        run: |
          echo "$CSV_URL"

      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run ${{ github.workspace }}/Modul\ 2\ -\ Membangun\ dan\ Mengelola\ Metadata\ dengan\ Tools\ Open-Source/Latihan-CI2/MLproject --env-manager=local

      # Upload model.pkl to Google Drive
      - name: Upload model to Google Drive
        working-directory: ${{ github.workspace }}
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python -m pip install google-api-python-client google-auth
          python "Modul 2 - Membangun dan Mengelola Metadata dengan Tools Open-Source/Latihan-CI2/MLproject/upload_to_gdrive.py"

      # Set up Git LFS untuk file besar (jika model >100MB)
      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs track "mlruns/**"
          git lfs track "*.pkl"
          git add .gitattributes
          git commit -m "Track large files in mlruns with Git LFS" || true

      # Save models to GitHub Repository
      - name: Save mlruns to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

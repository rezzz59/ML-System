name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "Latihan-CI2/MLproject/train_pca.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL

      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run Latihan-ci2/MLproject --env-manager=local

      # Save models to GitHub Repository
      - name: Save mlruns to repo
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push origin main
        
        # Set up Git LFS sebelum melakukan push file besar
      - name: Set up Git LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git lfs install                                    # 1. Inisialisasi LFS di server Ubuntu Actions
          git lfs track "mlruns/**"                          # 2. Perintahkan LFS untuk mengunci folder mlruns
          git add .gitattributes                             # 3. Amankan file konfigurasi pelacakan LFS
          git commit -m "Track large files in mlruns with Git LFS" || true
          git push origin main

      # Jalankan push akhir untuk seluruh artefak mlruns
      - name: Save mlruns to repo
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add -f mlruns/                                 # Force add folder mlruns
          git commit -m "Save mlruns from CI run" || true
          git push origin main
      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow
      
      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          mlflow run Modul\ 2\ -\ Membangun\ dan\ Mengelola\ Metadata\ dengan\ Tools\ Open-Source/Latihan-CI2/MLproject --env-manager=local 

      # Install library Google Client API
      - name: Install Google Drive Dependencies
        run: |
          pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      # Tembak langsung file modelnya ke awan Google Drive
      - name: Upload to Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python "Modul 2 - Membangun dan Mengelola Metadata dengan Tools Open-Source/Latihan-CI2/MLproject/upload_to_gdrive.py"
